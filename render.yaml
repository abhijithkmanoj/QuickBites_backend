# Render Blueprint for QuickBites Backend
# Deploy this as a Background Worker / Web Service on Render

services:
  - type: web
    name: quickbites-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: quickbites-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: quickbites-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: CORS_ORIGINS
        value: https://quickbites.vercel.app,https://quickbites.com
    healthCheckPath: /healthz
    autoDeploy: true

  - type: redis
    name: quickbites-redis
    ipAllowList: []
    plan: free

databases:
  - name: quickbites-db
    plan: free
    databaseName: quickbites
    user: quickbites
